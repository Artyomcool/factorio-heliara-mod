[item-description]
fullerene=A stable carbon allotrope unique to Heliara. The cornerstone of the entire carbon tech tree.
graphite=Pure carbon in layered form. Used in circuits and as fuel.
graphite_circuit=A circuit made from graphite and silicon. Replaces copper-based circuits in the Heliara tech tree.
silicon_substrate=A refined silicon base layer for graphite circuits.
osmosis_filter=A filtration cartridge consumed by the osmosis pipejack to purify extracted fluid.
fullerene_solid_fuel=Dense solid fuel made from fullerene. Burns hot and clean.
fullerene_rocket_fuel=High-performance rocket fuel derived from fullerene. Required for steam rocket launches.
solar_reflector=An orbital mirror element that reflects sunlight onto Heliara. Each reflector boosts solar power on the surface.
steam_cargo=A pressurised cargo pod launched via steam rocket to a space platform.

