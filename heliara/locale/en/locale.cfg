[entity-description]
shungite=Carbon-rich mineral unique to Heliara. The primary source of fullerene, graphite, and carbon.
huge_fullerene_rock=A massive fullerene formation. Mine it to unlock advanced carbon processing.
brackish_vent=A natural vent emitting saline fluid. Tap it with an osmosis pipejack to extract osmosis fluid.
fullerene_solar_panel=An advanced solar panel with fullerene-coated cells. Requires fullerene fuel to operate — runs dry without it and explodes, leaving scorched remnants. Output scales with solar reflectors deployed in Heliara's atmosphere.
fullerene_extraction_bath=Chemically extracts fullerene, graphite, and carbon from shungite using electrolytic processes.
fullerene_lab=A research laboratory powered by fullerene. Required for Heliara science packs.
heliara_assembling_machine=A rugged assembling machine adapted for Heliara's harsh environment.
dryer=Removes moisture from raw materials. Also capable of extracting water from concrete.
osmosis_pipejack=Connects to a brackish vent and pumps osmosis fluid. Place directly on a vent.
wireless_pole=Transmits electric power wirelessly over very long distances using fullerene coils.
effective_wireless_pole=An upgraded wireless pole with significantly reduced energy drain.
steam_rocket_silo=Launches rockets using high-pressure steam. Automatically reconfigures based on the loaded recipe.
solar_reflector=A lightweight orbital reflector that redirects sunlight onto Heliara's surface. Increases solar power output and shortens nights.

