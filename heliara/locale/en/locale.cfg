[technology-description]
planet-discovery-heliara=Travel to Heliara, a sun-scorched world rich in carbon minerals.
fullerene_extraction_bath=Build a chemical bath to extract fullerene, graphite, and carbon from shungite.
fullerene_solar_panel=Construct fullerene-coated solar panels that benefit from solar reflectors in orbit.
solar_reflector=Launch solar reflectors into Heliara's atmosphere to boost solar power and shorten nights.
carbon-electrolitic-processing=Use electrolysis to refine shungite into pure fullerene, graphite, and carbon. Unlocks the fullerene science pack.
fullerene_lab=Build a laboratory that runs on fullerene fuel to research advanced carbon technologies.
graphite_circuit=Manufacture graphite-based circuits as a copper-free alternative to electronic circuits.
heliara_assembling_machine=Construct a heavy-duty assembling machine built for Heliara's conditions.
osmosis_pipejack=Tap brackish vents on Heliara to extract osmosis fluid for filtration processes.
steam_cargo=Launch pressurised cargo pods to space platforms using steam-powered silos.
coal-productivity=Improve productivity of all carbon extraction and conversion recipes.
advanced-shungite=Unlock improved shungite processing recipes for higher yields.
advanced-fullerene=Research advanced fullerene conversion techniques for post-launch production.
effective_wireless_pole=Upgrade wireless poles to reduce their passive energy drain.
advanced-character-distance=Extend your personal build and reach distance.

